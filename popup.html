<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PAW</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <header class="p-header">
    <div class="p-header-left">
      <div class="p-logo" aria-hidden="true">
        <img src="images/icon48.png" alt="PAW logo" width="22" height="22">
      </div>
      <span class="p-wordmark">PAW</span>
      <span class="p-tagline">for Emacs</span>
    </div>
    <button class="p-settings-btn" id="openSettings" type="button"
            title="Open settings" aria-label="Open PAW settings">
      <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M8 1v1.5M8 13.5V15M15 8h-1.5M2.5 8H1M12.36 3.64l-1.06 1.06M4.7 11.3l-1.06 1.06M12.36 12.36l-1.06-1.06M4.7 4.7L3.64 3.64"
              stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </button>
  </header>

  <section class="p-toggles" aria-label="Extension settings">
    <div class="p-row">
      <label class="p-label" for="toggleButton">Enable</label>
      <div class="p-right">
        <span class="p-badge" id="statusText" aria-live="polite" aria-atomic="true"></span>
        <label class="p-switch" title="Toggle extension on/off">
          <input type="checkbox" id="toggleButton" role="switch" aria-label="Enable extension">
          <span class="p-track" aria-hidden="true"></span>
        </label>
      </div>
    </div>
    <div class="p-row">
      <label class="p-label" for="singleClickButton">Single-Click</label>
      <div class="p-right">
        <span class="p-badge" id="singleClickStatusText" aria-live="polite" aria-atomic="true"></span>
        <label class="p-switch" title="Toggle single-click mode">
          <input type="checkbox" id="singleClickButton" role="switch" aria-label="Enable single-click mode">
          <span class="p-track" aria-hidden="true"></span>
        </label>
      </div>
    </div>
    <div class="p-row">
      <label class="p-label" for="autoHighlightButton">Auto-Highlight</label>
      <div class="p-right">
        <span class="p-badge" id="autoHighlightStatusText" aria-live="polite" aria-atomic="true"></span>
        <label class="p-switch" title="Toggle auto-highlight">
          <input type="checkbox" id="autoHighlightButton" role="switch" aria-label="Enable auto-highlight">
          <span class="p-track" aria-hidden="true"></span>
        </label>
      </div>
    </div>
    <div class="p-row">
      <label class="p-label" for="showButtonButton">Show Button</label>
      <div class="p-right">
        <span class="p-badge" id="showButtonStatusText" aria-live="polite" aria-atomic="true"></span>
        <label class="p-switch" title="Show the floating button">
          <input type="checkbox" id="showButtonButton" role="switch" aria-label="Show floating button">
          <span class="p-track" aria-hidden="true"></span>
        </label>
      </div>
    </div>
  </section>

  <section class="p-media" aria-label="Browser media controls">
    <div class="p-media-head">
      <div class="p-section-label">Media</div>
      <div class="p-media-right">
        <span class="p-badge" id="mediaBridgeStatusText" aria-live="polite" aria-atomic="true"></span>
        <label class="p-switch" title="Enable browser media bridge">
          <input type="checkbox" id="mediaBridgeButton" role="switch" aria-label="Enable browser media bridge">
          <span class="p-track" aria-hidden="true"></span>
        </label>
      </div>
      <button id="mediaRefresh" class="p-media-refresh" type="button"
              title="Refresh media status" aria-label="Refresh media status">
        <svg class="p-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M13 4.5A5.5 5.5 0 0 0 3.4 3L2 4.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M2 1.5v2.9h2.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 11.5A5.5 5.5 0 0 0 12.6 13L14 11.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M14 14.5v-2.9h-2.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="p-media-status" aria-live="polite" aria-atomic="true">
      <span id="mediaStatusDot" class="p-media-dot" aria-hidden="true"></span>
      <span id="mediaStatusText" class="p-media-status-text">Disabled</span>
      <span id="mediaStatusMeta" class="p-media-status-meta"></span>
    </div>
    <div class="p-media-controls" role="group" aria-label="Browser media playback controls">
      <button id="mediaBack" class="p-media-btn" type="button"
              title="Back 10 seconds" aria-label="Back 10 seconds">
        <svg class="p-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M7 4 3 8l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13 4 9 8l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="mediaToggle" class="p-media-btn primary" type="button"
              title="Play/Pause" aria-label="Play or pause media">
        <svg class="p-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M5 3.5v9l7-4.5-7-4.5Z" fill="currentColor"/>
        </svg>
      </button>
      <button id="mediaForward" class="p-media-btn" type="button"
              title="Forward 10 seconds" aria-label="Forward 10 seconds">
        <svg class="p-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="m9 4 4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="m3 4 4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </section>

  <section class="p-protocol" aria-label="Send to Emacs">
    <div class="p-section-label">Send to</div>
    <div id="contextMenu" class="p-protocol-list" role="group" aria-label="Protocol buttons"></div>
  </section>

  <section class="p-capture" aria-label="Tab management">
    <div class="p-section-label">Tabs</div>
    <div class="p-capture-row">
      <button id="captureTab" class="p-capture-btn" type="button"
              title="Capture current tab and close it"
              aria-label="Capture current tab and close it">
        <svg class="p-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 2v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M4 7l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 14h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Capture Tab
      </button>
      <button id="captureAllTabs" class="p-capture-btn" type="button"
              title="Capture all tabs in this window and close them"
              aria-label="Capture all tabs in this window">
        <svg class="p-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M5 1v6M2 5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M11 1v6M8 5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M1 14h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Capture All
      </button>
    </div>
    <button id="openTabManager" class="p-manager-btn" type="button"
            aria-label="Open the PAW Tab Manager">
      <svg class="p-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <rect x="2" y="3" width="12" height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="2" y="7" width="12" height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="2" y="11" width="12" height="1.5" rx="0.75" fill="currentColor"/>
      </svg>
      Manage Tabs
    </button>
  </section>

  <script src="popup.js"></script>
</body>
</html>
